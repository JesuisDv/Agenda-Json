                <form class="mb-3" id="appointmentForm">
                      <label for="client_name" class="form-label">Nombre</label>
                      <input
                        class="form-control text-center"
                        type="text"
                        id="client_name"
                        placeholder="Nombre"
                        required
                      />
                    
                      <label for="client_phone" class="form-label">Telefono</label>
                      <input
                        class="form-control text-center"
                        type="tel"
                        id="client_phone"
                        placeholder="Telefono"
                        required
                      />
                    
                      <label for="appointment_date" class="form-label">Fecha</label>
                      <input
                        class="form-control text-center"
                        type="date"
                        id="appointment_date"
                        required
                      />
                    
                      <label for="appointment_time" class="form-label">Hora</label>
                      <input
                        class="form-control text-center"
                        type="time"
                        id="appointment_time"
                        required   
                      />
